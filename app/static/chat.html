<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#7a5fc4" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dubly" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/static/icon-180.png" />
<title>Dubly</title>
<style>
  /* University of Washington — Lavender Cloud (soft light) */
  :root { --bg:#efe9fb; --bar:#e3dbf5; --me:#8b6fd4; --them:var(--surface); --text:#3a2f55; --muted:#8a7fa5;
    --accent1:#8b6fd4; --accent2:#a98ee0; --gold:#8b6fd4;
    --surface:#ffffff; --line:#ddd2f0; --press:#ece4f8; --link:#6f4fc0; }
  html.dark { --bg:#16101f; --bar:#221836; --text:#efeaf6; --muted:#b3a7c8;
    --surface:#241a3d; --line:#3a2c55; --press:#33264f; --link:#bda6ec; }
  html.dark body { background:radial-gradient(125% 75% at 50% -8%, #2a1b4a 0%, #150d24 52%) fixed, var(--bg); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; color:var(--text);
    background:radial-gradient(125% 75% at 50% -8%, #f3eefc 0%, #e6ddf7 52%) fixed, var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  #app { display:flex; flex-direction:column; height:100dvh; }
  header { background:linear-gradient(180deg,#7a5fc4,#9279d6); color:#fff; padding:max(env(safe-area-inset-top),10px) 8px 10px;
    border-bottom:1px solid #6f54b8; position:sticky; top:0; z-index:5;
    display:flex; align-items:center; gap:8px; }
  header .avatar { width:56px; height:56px; border-radius:50%; flex:0 0 auto; font-size:18px;
    background:linear-gradient(135deg,var(--accent1),var(--accent2)); display:flex; align-items:center;
    justify-content:center; box-shadow:0 3px 12px rgba(139,111,212,.4); }
  header .title { flex:1; text-align:left; font-weight:600; font-size:17px; }
  header .title small { display:block; font-weight:400; font-size:12px; color:rgba(255,255,255,.82); margin-top:2px; }
  .onlinedot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#2fbf71;
    margin-right:5px; vertical-align:middle; animation:pulse 2.2s infinite; }
  @keyframes pulse { 0%{ box-shadow:0 0 0 0 rgba(47,191,113,.55); } 70%{ box-shadow:0 0 0 6px rgba(47,191,113,0); }
    100%{ box-shadow:0 0 0 0 rgba(47,191,113,0); } }
  .iconbtn { width:38px; height:38px; border:none; background:transparent; color:var(--text);
    font-size:20px; border-radius:50%; cursor:pointer; flex:0 0 auto; }
  .iconbtn:active { background:var(--line); }
  #menu { position:absolute; top:calc(max(env(safe-area-inset-top),10px) + 42px); right:8px;
    background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden; z-index:9;
    box-shadow:0 8px 30px rgba(0,0,0,.5); min-width:210px; }
  #menu button { display:flex; align-items:center; gap:10px; width:100%; padding:13px 16px; border:none;
    background:none; color:var(--text); font-size:15px; text-align:left; cursor:pointer; }
  #menu button:active { background:var(--line); }
  #menu .sep { height:1px; background:var(--line); }
  #log { flex:1; overflow-y:auto; padding:14px 12px 6px; display:flex; flex-direction:column; gap:8px;
    -webkit-overflow-scrolling:touch; }
  .row { display:flex; } .row.me { justify-content:flex-end; }
  .row.them { justify-content:flex-start; align-items:flex-end; gap:6px; }
  .msg-av { width:44px; height:44px; border-radius:50%; flex:0 0 auto; align-self:flex-end;
    background:#fff url('/static/dubs.png') center/cover; box-shadow:0 1px 3px rgba(90,70,130,.22); }
  .avatar.dubs-pic, .gate-badge.dubs-pic { background:#fff url('/static/dubs.png') center/cover; }
  .bubble { max-width:78%; padding:9px 13px; border-radius:19px; font-size:16px; line-height:1.35;
    white-space:pre-wrap; word-wrap:break-word; animation:pop .28s cubic-bezier(.2,.8,.3,1.05); }
  @keyframes pop { from{ opacity:0; transform:translateY(8px) scale(.96); } to{ opacity:1; transform:none; } }
  .me .bubble { background:linear-gradient(135deg,var(--accent1),var(--accent2)); color:#fff;
    border-bottom-right-radius:5px; box-shadow:0 2px 10px rgba(139,111,212,.25); }
  .them .bubble { background:var(--them); color:var(--text); border-bottom-left-radius:5px;
    box-shadow:0 1px 3px rgba(90,70,130,.13); }
  .bubble a.doc { display:inline-block; margin-top:6px; padding:7px 12px; background:rgba(139,111,212,.15);
    border-radius:12px; color:inherit; text-decoration:none; font-size:14px; }
  .bubble a:not(.doc) { color:var(--link); text-decoration:underline; word-break:break-all; }
  .me .bubble a:not(.doc) { color:var(--press); }
  .bubble .deckbtn { display:flex; flex-direction:column; gap:2px; margin-top:8px; width:100%; text-align:left;
    padding:11px 14px; border:none; border-radius:14px; cursor:pointer; color:#fff;
    background:linear-gradient(135deg,var(--accent1),var(--accent2)); box-shadow:0 4px 14px rgba(139,111,212,.35); }
  .bubble .deckbtn:active { transform:scale(.98); }
  .bubble .deckbtn .dt { font-weight:600; font-size:15px; }
  .bubble .deckbtn .ds { font-size:12px; opacity:.85; }
  #deckOverlay { position:fixed; inset:0; z-index:40; background:var(--bg); }
  #deckOverlay iframe { width:100%; height:100%; border:none; }
  #deckOverlay #deckClose { position:absolute; top:max(env(safe-area-inset-top),10px); right:12px;
    width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; font-size:18px; color:#fff;
    background:rgba(58,47,85,.85); backdrop-filter:blur(6px); box-shadow:0 2px 10px rgba(0,0,0,.4); }
  .dots { display:inline-flex; gap:4px; }
  .dots i { width:7px; height:7px; border-radius:50%; background:var(--muted); display:block;
    animation:blink 1.3s infinite both; }
  .dots i:nth-child(2){ animation-delay:.2s; } .dots i:nth-child(3){ animation-delay:.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }
  footer { background:var(--bar); padding:8px 10px calc(env(safe-area-inset-bottom) + 8px);
    border-top:1px solid var(--line); display:flex; gap:8px; align-items:flex-end; }
  textarea { flex:1; resize:none; border:none; outline:none; background:var(--surface); color:var(--text);
    border-radius:20px; padding:10px 14px; font-size:16px; max-height:120px; line-height:1.3; font-family:inherit; }
  button#send { border:none; background:linear-gradient(135deg,var(--accent1),var(--accent2)); color:#fff;
    width:40px; height:40px; border-radius:50%; font-size:19px; flex:0 0 auto; cursor:pointer;
    box-shadow:0 3px 12px rgba(139,111,212,.4); transition:transform .1s; }
  button#send:active { transform:scale(.9); } button#send:disabled { opacity:.4; box-shadow:none; }
  button#send.stop { background:linear-gradient(135deg,#ff5d5d,#ff2d55); box-shadow:0 3px 12px rgba(255,45,85,.4); }
  #attach, #mic { font-size:21px; }
  #mic.listening { color:#e5484d; animation:pulse 1.4s infinite; }
  #previews { display:flex; gap:8px; padding:6px 12px; overflow-x:auto; background:var(--bar);
    -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  #previews::-webkit-scrollbar { display:none; }
  #previews .chip { flex:0 0 auto; display:flex; align-items:center; gap:6px; max-width:210px;
    background:var(--surface); border:1px solid var(--line); color:var(--text); padding:6px 10px; border-radius:12px;
    font-size:13px; }
  #previews .chip span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #previews .chip button { border:none; background:none; color:var(--muted); font-size:15px; cursor:pointer; padding:0; }
  #chips { display:flex; gap:8px; padding:4px 12px 8px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none; background:var(--bar); }
  #chips::-webkit-scrollbar { display:none; }
  #chips button { flex:0 0 auto; border:1px solid var(--line); background:var(--surface); color:var(--text);
    padding:8px 14px; border-radius:18px; font-size:14px; white-space:nowrap; cursor:pointer; }
  #chips button:active { background:var(--press); transform:scale(.96); }
  .gate-badge { width:74px; height:74px; border-radius:22px; font-size:38px; display:flex; align-items:center;
    justify-content:center; background:linear-gradient(135deg,var(--accent1),var(--accent2));
    box-shadow:0 12px 44px rgba(139,111,212,.35); margin-bottom:4px; }
  #gate { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; padding:24px; text-align:center; z-index:20; }
  #gate h1 { font-size:20px; margin:0; } #gate p { color:var(--muted); margin:0; font-size:14px; }
  #gate input { font-size:16px; padding:11px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--surface); color:var(--text); width:min(280px,80vw); text-align:center; }
  #gate button { font-size:16px; padding:11px 22px; border-radius:12px; border:none; background:var(--me);
    color:#fff; cursor:pointer; }
  #gate .err { color:#ff6b6b; font-size:13px; min-height:16px; }
  #toast { position:fixed; bottom:84px; left:50%; transform:translateX(-50%); background:var(--line);
    color:var(--text); padding:9px 16px; border-radius:20px; font-size:14px; z-index:30; opacity:0;
    transition:opacity .25s; pointer-events:none; }
  #toast.show { opacity:1; }
  /* chat drawer (ChatGPT-style conversations) */
  #drawerOverlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:15; }
  #drawer { position:fixed; top:0; left:0; bottom:0; width:min(82vw,320px); z-index:16;
    background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column;
    box-shadow:0 0 40px rgba(0,0,0,.55); }
  .drawer-head { display:flex; align-items:center; justify-content:space-between;
    padding:max(env(safe-area-inset-top),12px) 12px 12px 16px; border-bottom:1px solid var(--line);
    font-weight:600; font-size:16px; }
  #newChatBtn { font-size:24px; line-height:1; }
  #chatSearch { margin:8px 10px 4px; padding:9px 12px; border-radius:12px; border:1px solid var(--line);
    background:var(--surface); color:var(--text); font-size:14px; outline:none; }
  #chatList { flex:1; overflow-y:auto; padding:8px; }
  .chat-row { display:flex; align-items:center; gap:2px; border-radius:12px; padding:2px; }
  .chat-row.active { background:var(--press); }
  .chat-title { flex:1; min-width:0; text-align:left; border:none; background:none; color:var(--text);
    font-size:15px; padding:9px 10px; cursor:pointer; display:flex; flex-direction:column; align-items:flex-start; gap:1px; }
  .chat-title .ct-title { max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-title .ct-snip { max-width:100%; font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-act { border:none; background:none; color:var(--muted); font-size:14px; padding:9px 7px;
    cursor:pointer; border-radius:8px; flex:0 0 auto; }
  .chat-act:active { background:var(--line); }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="app">
  <header>
    <button class="iconbtn" id="drawerBtn" aria-label="Chats">☰</button>
    <div class="avatar dubs-pic"></div>
    <div class="title">Dubly<small><span class="onlinedot"></span>your husky study buddy · Go Dawgs</small></div>
    <button class="iconbtn" id="menuBtn" aria-label="Menu">⋯</button>
  </header>
  <div id="menu" class="hidden">
    <button id="mNotify">🔔 <span>Enable notifications</span></button>
    <div class="sep"></div>
    <button id="mDark">🌙 <span>Dark mode</span></button>
    <div class="sep"></div>
    <button id="mInstall" class="hidden">📲 <span>Install app</span></button>
    <div class="sep hidden" id="mInstallSep"></div>
    <button id="mClear">🗑️ <span>Clear chat</span></button>
  </div>
  <div id="log"></div>
  <div id="chips" class="hidden">
    <button data-msg="what's due this week?">📅 What's due?</button>
    <button data-msg="how are my grades looking?">📊 My grades</button>
    <button data-msg="help me build an essay blueprint to get started">📝 Essay blueprint</button>
    <button data-msg="make me a study plan for this week based on what's actually due">🗓️ Study plan</button>
    <button data-msg="what do I need on my finals to keep my grades up?">🎯 What do I need?</button>
  </div>
  <div id="previews" class="hidden"></div>
  <footer>
    <button class="iconbtn" id="attach" aria-label="Attach a picture or document">📎</button>
    <button class="iconbtn" id="mic" aria-label="Voice input">🎤</button>
    <input type="file" id="file" multiple hidden />
    <textarea id="text" rows="1" placeholder="Message" autocomplete="off"></textarea>
    <button id="send" aria-label="Send">↑</button>
  </footer>
</div>

<div id="drawerOverlay" class="hidden"></div>
<aside id="drawer" class="hidden">
  <div class="drawer-head"><span>Chats</span>
    <button class="iconbtn" id="newChatBtn" aria-label="New chat">＋</button></div>
  <input id="chatSearch" placeholder="🔍 Search chats…" autocomplete="off" />
  <div id="chatList"></div>
</aside>

<div id="deckOverlay" class="hidden">
  <button id="deckClose" aria-label="Close">✕</button>
  <iframe title="Study deck"></iframe>
</div>

<div id="gate">
  <div class="gate-badge dubs-pic"></div>
  <h1>Dubly</h1>
  <p>your husky study buddy · enter your passcode to let Dubly out 🐾</p>
  <input id="pass" type="password" inputmode="text" placeholder="passcode" autocomplete="off" />
  <button id="unlock">Unlock</button>
  <div class="err" id="gateErr"></div>
</div>
<div id="toast"></div>

<script>
const log = document.getElementById('log');
const ta = document.getElementById('text');
const sendBtn = document.getElementById('send');
const gate = document.getElementById('gate');
const menu = document.getElementById('menu');
const chips = document.getElementById('chips');
let KEY = localStorage.getItem('chatKey') || '';
let lastId = 0, busy = false, deferredInstall = null, vapidKey = '';
let pendingFiles = [], currentGen = null, controller = null;
let currentChat = parseInt(localStorage.getItem('chatId') || '') || null;

const CLEAR_RE = /^(clear|clear chat|clear all|clear everything|reset)$/i;
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
// Turn bare http(s) URLs in already-escaped text into tappable links (so a
// syllabus/assignment link the assistant drops in is clickable, not dead text).
function linkify(s){
  return s.replace(/https?:\/\/[^\s<]+/g, (u)=>{
    let trail=''; const m=u.match(/[.,;:!?)\]]+$/);
    if (m){ trail=m[0]; u=u.slice(0,-trail.length); }
    return `<a href="${u}" target="_blank" rel="noopener noreferrer">${u}</a>`+trail;
  });
}
function atBottom(){ return log.scrollHeight - log.scrollTop - log.clientHeight < 80; }
function toBottom(){ log.scrollTop = log.scrollHeight; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2200); }
// Quick-start chips: visible only until you've said something.
function updateChips(){ chips.classList.toggle('hidden', !!log.querySelector('.row.me')); }
chips.querySelectorAll('button').forEach(b=> b.addEventListener('click', ()=>{ if(!busy) send(b.dataset.msg); }));
// Study deck: open the link in a full-screen in-app overlay (no leaving the app).
const deckOverlay = document.getElementById('deckOverlay');
const deckFrame = deckOverlay.querySelector('iframe');
log.addEventListener('click', e=>{ const b=e.target.closest('.deckbtn'); if(b){ openDeck(b.dataset.url); } });
function openDeck(url){ deckFrame.src = url; deckOverlay.classList.remove('hidden'); }
function closeDeck(){ deckOverlay.classList.add('hidden'); deckFrame.src = 'about:blank'; }
document.getElementById('deckClose').addEventListener('click', closeDeck);

const STUDY_RE = /https?:\/\/[^\s]*\/study\/[0-9a-f]+/i;
function addBubble(role, text, media){
  const stick = atBottom();
  const row = document.createElement('div');
  row.className = 'row ' + (role === 'user' ? 'me' : 'them');
  text = text || '';
  // Upgrade a study link into a tappable deck card that opens inside the app.
  let studyUrl = null, display = text;
  if (role !== 'user'){
    const m = text.match(STUDY_RE);
    if (m){ studyUrl = m[0]; display = text.replace(studyUrl, '').replace(/[\s:—-]+$/, '').trim(); }
  }
  let inner = linkify(esc(display));
  if (studyUrl){
    const exam = !/flashcard/i.test(text);  // study links are quizzes unless they say flashcards
    inner += `<button class="deckbtn" data-url="${esc(studyUrl)}">`
      + `<span class="dt">${exam ? '📝 Quiz' : '📇 Flashcards'}</span>`
      + `<span class="ds">tap to study →</span></button>`;
  }
  if (media) inner += `<a class="doc" href="${esc(media)}" target="_blank" rel="noopener" download>📄 Download</a>`;
  const av = (role === 'user') ? '' : '<div class="msg-av"></div>';  // Dubs' face on his replies
  row.innerHTML = `${av}<div class="bubble">${inner}</div>`;
  log.appendChild(row);
  if (stick || role === 'user') toBottom();
}
let typingEl = null;
function showTyping(){ if (typingEl) return;
  typingEl = document.createElement('div'); typingEl.className = 'row them';
  typingEl.innerHTML = '<div class="msg-av"></div><div class="bubble"><span class="dots"><i></i><i></i><i></i></span></div>';
  log.appendChild(typingEl); toBottom(); }
function hideTyping(){ if (typingEl){ typingEl.remove(); typingEl = null; } }

async function api(path, opts={}){
  opts.headers = Object.assign({'X-Chat-Key': KEY}, opts.headers||{});
  const r = await fetch(path, opts);
  if (r.status === 401){ lockOut(); throw new Error('unauthorized'); }
  return r;
}
function lockOut(){ const hadKey = !!KEY; localStorage.removeItem('chatKey'); KEY=''; gate.classList.remove('hidden');
  document.getElementById('gateErr').textContent = hadKey ? 'Wrong passcode — try again.' : ''; }

function chatParam(){ return currentChat ? ('&chat_id=' + currentChat) : ''; }
async function loadHistory(){
  const r = await api('/chat/messages?after=0' + chatParam()); const data = await r.json();
  if (data.chat_id){ currentChat = data.chat_id; localStorage.setItem('chatId', currentChat); }
  log.innerHTML = ''; lastId = 0;
  for (const m of data.messages){ addBubble(m.role, m.text, m.media_url); lastId = Math.max(lastId, m.id); }
  toBottom(); updateChips();
}
async function poll(){
  if (busy || !KEY) return;
  try { const r = await api('/chat/messages?after=' + lastId + chatParam()); const data = await r.json();
    for (const m of data.messages){ addBubble(m.role, m.text, m.media_url); lastId = Math.max(lastId, m.id); }
  } catch(e){}
}

// ---- chat drawer (multiple conversations) ----
const drawer = document.getElementById('drawer');
const drawerOverlay = document.getElementById('drawerOverlay');
const chatList = document.getElementById('chatList');
function openDrawer(){ drawer.classList.remove('hidden'); drawerOverlay.classList.remove('hidden');
  const cs=document.getElementById('chatSearch'); cs.value=''; fetchChats(); }
function closeDrawer(){ drawer.classList.add('hidden'); drawerOverlay.classList.add('hidden'); }
// Search-as-you-type across chat titles + messages.
let _searchTimer = null;
document.getElementById('chatSearch').addEventListener('input', e=>{
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(async ()=>{
    const q = e.target.value.trim();
    try { const r = await api('/chats/search?q=' + encodeURIComponent(q)); renderChats((await r.json()).chats || []); } catch(_){}
  }, 200);
});
document.getElementById('drawerBtn').addEventListener('click', openDrawer);
drawerOverlay.addEventListener('click', closeDrawer);
document.getElementById('newChatBtn').addEventListener('click', newChat);
async function fetchChats(){
  try { const r = await api('/chats'); const data = await r.json(); renderChats(data.chats || []); } catch(e){}
}
function renderChats(chats){
  chatList.innerHTML = '';
  chats.forEach(c=>{
    const row = document.createElement('div');
    row.className = 'chat-row' + (c.id === currentChat ? ' active' : '');
    const t = document.createElement('button'); t.className = 'chat-title';
    t.innerHTML = `<span class="ct-title">${esc(c.title || 'New chat')}</span>`
      + (c.snippet ? `<span class="ct-snip">${esc(c.snippet)}</span>` : '');
    t.addEventListener('click', ()=> switchChat(c.id));
    const ren = document.createElement('button'); ren.className = 'chat-act'; ren.textContent = '✎';
    ren.title = 'Rename';
    ren.addEventListener('click', e=>{ e.stopPropagation(); renameChat(c.id, c.title); });
    const del = document.createElement('button'); del.className = 'chat-act'; del.textContent = '🗑';
    del.title = 'Delete';
    del.addEventListener('click', e=>{ e.stopPropagation(); deleteChat(c.id); });
    row.append(t, ren, del); chatList.appendChild(row);
  });
}
async function switchChat(id){
  if (id === currentChat){ closeDrawer(); return; }
  currentChat = id; localStorage.setItem('chatId', id);
  closeDrawer(); await loadHistory();
}
async function newChat(){
  try { const r = await api('/chats', { method:'POST' }); const data = await r.json();
    currentChat = data.id; localStorage.setItem('chatId', data.id);
    closeDrawer(); await loadHistory(); }
  catch(e){}
}
async function renameChat(id, cur){
  const name = prompt('Rename chat', cur || ''); if (name === null) return;
  try { await api('/chats/' + id, { method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ title: name }) }); fetchChats(); } catch(e){}
}
async function deleteChat(id){
  if (!confirm('Delete this chat?')) return;
  try { await api('/chats/' + id, { method:'DELETE' });
    if (id === currentChat){ currentChat = null; localStorage.removeItem('chatId'); await loadHistory(); }
    fetchChats(); } catch(e){}
}
async function send(forced){
  const text = (forced !== undefined ? forced : ta.value).trim();
  if ((!text && pendingFiles.length === 0) || busy) return;
  busy = true; updateSendButton();
  const files = pendingFiles.slice();
  const wasClear = files.length === 0 && CLEAR_RE.test(text.replace(/\s+/g,' ').trim());
  if (forced === undefined){ ta.value=''; ta.style.height='auto'; }
  const names = files.map(f=>f.name).join(', ');
  const display = files.length ? (text ? text+'\n📎 '+names : '📎 '+names) : text;
  addBubble('user', display, ''); clearPending(); showTyping();
  currentGen = (self.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now())+Math.random();
  controller = new AbortController();
  try {
    const r = await api('/chat/send', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text, attachments: files, gen_id: currentGen, chat_id: currentChat}),
      signal: controller.signal });
    const data = await r.json(); hideTyping();
    if (data.chat_id){ currentChat = data.chat_id; localStorage.setItem('chatId', currentChat); }
    if (wasClear){ log.innerHTML=''; lastId=0; toast('Chat cleared');
      for (const m of data.messages){ addBubble(m.role, m.text, m.media_url); lastId = Math.max(lastId, m.id); }
    } else for (const m of data.messages){
      if (m.role === 'assistant') addBubble(m.role, m.text, m.media_url);
      lastId = Math.max(lastId, m.id);
    }
    if (!drawer.classList.contains('hidden')) fetchChats();  // keep titles fresh if open
  } catch(e){ hideTyping();
    // Aborted = the user hit stop; the server discards that reply, so stay quiet.
    if (e && e.name === 'AbortError'){ toast('Stopped'); }
    else if (KEY) addBubble('assistant', '⚠️ connection hiccup — try again.', '');
  }
  finally { busy=false; controller=null; currentGen=null; updateSendButton(); toBottom(); updateChips(); }
}

// Send button doubles as a Stop button while a reply is in flight.
function updateSendButton(){
  sendBtn.disabled = false;
  if (busy){ sendBtn.textContent='■'; sendBtn.classList.add('stop'); sendBtn.setAttribute('aria-label','Stop'); }
  else { sendBtn.textContent='↑'; sendBtn.classList.remove('stop'); sendBtn.setAttribute('aria-label','Send'); }
}
function cancelSend(){
  if (controller){ try { controller.abort(); } catch(e){} }
  if (currentGen){ fetch('/chat/cancel', { method:'POST',
    headers:{'X-Chat-Key':KEY,'Content-Type':'application/json'},
    body: JSON.stringify({gen_id: currentGen}) }).catch(()=>{}); }
}

// ---- attachments (pictures / documents) ----
const fileInput = document.getElementById('file');
const previews = document.getElementById('previews');
document.getElementById('attach').addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', ()=>{ addFiles(fileInput.files); fileInput.value=''; });
function addFiles(list){
  for (const f of list){
    if (f.size > 12*1024*1024){ toast(`${f.name} is too big (max 12MB)`); continue; }
    const reader = new FileReader();
    reader.onload = ()=>{ const r=reader.result||''; const i=r.indexOf(',');
      pendingFiles.push({ name:f.name, content_type:f.type||'', data: i>=0 ? r.slice(i+1) : r });
      renderPreviews(); };
    reader.readAsDataURL(f);
  }
}
function renderPreviews(){
  previews.innerHTML='';
  previews.classList.toggle('hidden', pendingFiles.length===0);
  pendingFiles.forEach((f, idx)=>{
    const chip=document.createElement('div'); chip.className='chip';
    const isImg=(f.content_type||'').startsWith('image/');
    chip.innerHTML=`<span>${isImg?'🖼️':'📄'} ${esc(f.name)}</span>`;
    const x=document.createElement('button'); x.textContent='✕'; x.setAttribute('aria-label','Remove');
    x.addEventListener('click', ()=>{ pendingFiles.splice(idx,1); renderPreviews(); });
    chip.appendChild(x); previews.appendChild(chip);
  });
}
function clearPending(){ pendingFiles=[]; renderPreviews(); }

// ---- menu ----
function closeMenu(){ menu.classList.add('hidden'); }
document.getElementById('menuBtn').addEventListener('click', e=>{ e.stopPropagation();
  menu.classList.toggle('hidden'); });
document.addEventListener('click', ()=> closeMenu());
menu.addEventListener('click', e=> e.stopPropagation());

// ---- dark mode ----
const darkBtn = document.getElementById('mDark');
function applyDark(on){
  document.documentElement.classList.toggle('dark', on);
  localStorage.setItem('dark', on ? '1' : '0');
  darkBtn.innerHTML = on ? '☀️ <span>Light mode</span>' : '🌙 <span>Dark mode</span>';
}
darkBtn.addEventListener('click', ()=>{ closeMenu();
  applyDark(!document.documentElement.classList.contains('dark')); });
applyDark(localStorage.getItem('dark') === '1');

document.getElementById('mClear').addEventListener('click', ()=>{ closeMenu();
  if (confirm('Clear this chat? This erases the conversation.')) send('clear'); });

// ---- install (Android Chrome) ----
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredInstall=e;
  document.getElementById('mInstall').classList.remove('hidden');
  document.getElementById('mInstallSep').classList.remove('hidden'); });
document.getElementById('mInstall').addEventListener('click', async ()=>{ closeMenu();
  if (!deferredInstall) return; deferredInstall.prompt(); deferredInstall=null;
  document.getElementById('mInstall').classList.add('hidden');
  document.getElementById('mInstallSep').classList.add('hidden'); });

// ---- notifications / push ----
function urlB64ToUint8(b64){ const pad='='.repeat((4-b64.length%4)%4);
  const s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/'); const raw=atob(s);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0))); }
async function loadConfig(){ try { const r=await api('/chat/config'); vapidKey=(await r.json()).vapidPublicKey||''; } catch(e){} }
function refreshNotifyLabel(){
  const span=document.querySelector('#mNotify span');
  if (!('Notification' in window) || !vapidKey){ document.getElementById('mNotify').classList.add('hidden'); return; }
  span.textContent = (Notification.permission === 'granted') ? 'Notifications on ✓' : 'Enable notifications';
}
function sameKey(a, b){ if (!a || a.length !== b.length) return false;
  for (let i=0;i<a.length;i++){ if (a[i] !== b[i]) return false; } return true; }
async function subscribePush(){
  if (!vapidKey || !('serviceWorker' in navigator) || !('PushManager' in window)) return false;
  const reg = await navigator.serviceWorker.ready;
  const want = urlB64ToUint8(vapidKey);
  let sub = await reg.pushManager.getSubscription();
  // If an old subscription used a different VAPID key, it's dead — replace it.
  if (sub){
    const cur = (sub.options && sub.options.applicationServerKey)
      ? new Uint8Array(sub.options.applicationServerKey) : null;
    if (!sameKey(cur, want)){ try { await sub.unsubscribe(); } catch(e){} sub = null; }
  }
  if (!sub){ sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: want }); }
  await api('/chat/subscribe', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(sub) });
  return true;
}
document.getElementById('mNotify').addEventListener('click', async ()=>{ closeMenu();
  if (!('Notification' in window)){ toast('Notifications not supported here'); return; }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted'){ toast('Notifications blocked — enable in browser settings'); return; }
  try { await subscribePush(); toast('Notifications on ✓'); refreshNotifyLabel(); }
  catch(e){ toast('Couldn’t enable notifications'); }
});

// ---- voice input (Web Speech API) ----
(function(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = document.getElementById('mic');
  if (!SR){ micBtn.classList.add('hidden'); return; }   // not supported (e.g. some iOS)
  const recog = new SR();
  recog.lang = navigator.language || 'en-US';
  recog.interimResults = true; recog.continuous = false;
  let listening = false, base = '';
  recog.onstart = ()=>{ listening = true; micBtn.classList.add('listening'); };
  recog.onend   = ()=>{ listening = false; micBtn.classList.remove('listening'); };
  recog.onerror = ()=>{ listening = false; micBtn.classList.remove('listening'); };
  recog.onresult = (e)=>{
    let txt = '';
    for (let i=e.resultIndex; i<e.results.length; i++){ txt += e.results[i][0].transcript; }
    ta.value = (base + txt).trim();
    ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px';
  };
  micBtn.addEventListener('click', ()=>{
    if (listening){ recog.stop(); return; }
    base = ta.value ? ta.value + ' ' : '';
    try { recog.start(); } catch(e){}
  });
})();

// ---- input wiring ----
ta.addEventListener('input', ()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; });
ta.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
sendBtn.addEventListener('click', ()=> { if (busy) cancelSend(); else send(); });

document.getElementById('unlock').addEventListener('click', ()=>{
  const v = document.getElementById('pass').value.trim(); if (!v) return;
  KEY = v; localStorage.setItem('chatKey', v); start(); });
document.getElementById('pass').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('unlock').click(); });

// A fresh app-open (closed then reopened) starts a new chat. A plain reload
// stays put (sessionStorage survives reloads but is cleared when the app closes).
async function freshOpenChat(){
  try {
    const r = await api('/chats'); const chats = (await r.json()).chats || [];
    // Reuse an untouched "New chat" if one's already on top, else make a new one.
    if (chats.length && chats[0].title === 'New chat'){ currentChat = chats[0].id; }
    else { const nr = await api('/chats', { method:'POST' }); currentChat = (await nr.json()).id; }
    localStorage.setItem('chatId', currentChat);
  } catch(e){}
}
async function start(){
  try {
    await freshOpenChat();   // every app open (launch) starts a fresh chat
    await loadHistory(); gate.classList.add('hidden');
  }
  catch(e){ return; }
  await loadConfig(); refreshNotifyLabel();
  // If permission was already granted, keep the subscription fresh silently.
  if (('Notification' in window) && Notification.permission === 'granted'){ try { await subscribePush(); } catch(e){} }
}

if ('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }
setInterval(poll, 4000);
// If the OS kept the app alive in the background, returning to it after a while
// also counts as "reopening" -> start a fresh chat.
let _hiddenAt = 0;
document.addEventListener('visibilitychange', async ()=>{
  if (document.visibilityState === 'hidden'){ _hiddenAt = Date.now(); return; }
  if (KEY && _hiddenAt && (Date.now() - _hiddenAt > 120000)){   // away > 2 min
    _hiddenAt = 0; try { await freshOpenChat(); log.innerHTML=''; lastId=0; await loadHistory(); } catch(e){}
  }
});
// Always try to start: in demo mode the server is open (no passcode) so it just
// loads; in passcode mode the first request 401s and start() shows the gate.
start();
</script>
